{% extends 'index.html' %}
{% block content %}
{% load crispy_forms_tags %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 border-start border-success border-4">
                <div class="card-header bg-white border-0 pt-4 px-4">
                    <div class="d-flex align-items-center">
                        <div class="bg-success bg-opacity-10 p-2 rounded-3 me-3">
                            <i class="bi bi-envelope-fill text-secondary fs-4"></i>
                        </div>
                        <div>
                            <h5 class="mb-0 fw-bold">FORGOT PASSWORD</h5>
                            <small class="text-muted">Enter your registered email to continue</small>
                        </div>
                    </div>
                </div>

                <div class="card-body p-4">
                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-danger">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-12">
                                {{ form|crispy }}
                            </div>
                        </div>

                        <div class="mt-4 pt-3 border-top d-flex align-items-center justify-content-between">
                            <div class="text-muted small">
                                Remembered it?
                                <a href="{% url 'login' %}" class="text-primary fw-bold" style="text-decoration: none;">
                                    Back to login
                                </a>
                            </div>
                            <div class="btn-group">
                                <button type="submit" class="btn btn-success px-5 fw-semibold shadow-sm text-white">
                                    VERIFY
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

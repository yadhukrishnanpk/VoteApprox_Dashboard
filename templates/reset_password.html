{% extends 'index.html' %}
{% block content %}
{% load crispy_forms_tags %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 border-start border-success border-4">
                <div class="card-header bg-white border-0 pt-4 px-4">
                    <div class="d-flex align-items-center">
                        <div class="bg-success bg-opacity-10 p-2 rounded-3 me-3">
                            <i class="bi bi-shield-lock-fill text-secondary fs-4"></i>
                        </div>
                        <div>
                            <h5 class="mb-0 fw-bold">SET NEW PASSWORD</h5>
                            <small class="text-muted">Choose a strong new password</small>
                        </div>
                    </div>
                </div>

                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-12">
                                {{ form|crispy }}
                            </div>
                        </div>

                        <div class="mt-4 pt-3 border-top d-flex justify-content-end">
                            <button type="submit" class="btn btn-success px-5 fw-semibold shadow-sm text-white">
                                RESET PASSWORD
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

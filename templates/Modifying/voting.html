{% extends 'index.html' %} 
{% block content %} 
{% load crispy_forms_tags %}

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />

<div class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0" style="border-radius: 15px; overflow: hidden;">
                <div class="p-4 text-center" style="background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);">
                    <h4 class="text-white mb-0 fw-bold">VOTE FOR CITIZEN</h4>
                    <p class="text-white-50 small mb-0">Please fill out the form below to submit your ballot.</p>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form method="post" class="my-class" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            {{ form|crispy }}
                        </div>

                        <hr class="my-4 opacity-0">

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm" 
                                    style="border-radius: 10px; font-weight: 600; letter-spacing: 1px; background-color: #0d6efd; border: none;">
                                SUBMIT VOTE
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <p class="text-center mt-4 text-muted small">
                <i class="bi bi-shield-lock me-1"></i> Your vote is encrypted and secure.
            </p>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    $(document).ready(function() {
        $('select').select2({
            theme: 'bootstrap-5',
            placeholder: 'Click to select...',
            width: '100%'
        });
    });
</script>
{% endblock %}
